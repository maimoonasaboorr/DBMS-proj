<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Reviews | Luxury Rent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <header class="nav">
    <div class="brand">LUXURY RENT</div>
    <nav class="menu">
      <a href="{{ url_for('products_dashboard') }}">Products</a>
      <a href="{{ url_for('my_bookings') }}">My Bookings</a>
      <a href="{{ url_for('my_rentals') }}">My Rentals</a>
      <a href="{{ url_for('my_payments') }}">My Payments</a>
      <a href="{{ url_for('my_reviews') }}">My Reviews</a>
      <a href="{{ url_for('my_profile') }}">My Profile</a>
    </nav>
    <a class="ghost-btn signup-btn" href="{{ url_for('logout') }}">Logout</a>
  </header>

  <section class="auth-card">
    <p class="eyebrow">USER DASHBOARD</p>
    <h1>My Reviews</h1>

    {% if reviews %}
      {% for r in reviews %}
        <div style="margin:10px 0;padding:10px;border:1px solid #d1b780;border-radius:10px;background:rgba(255,249,238,.7);">
          <div><strong>{{ r[1] }}</strong> | Rating: {{ r[2] }}/5</div>
          <div>{{ r[3] or "No comment" }}</div>
          <form method="post" action="{{ url_for('delete_review', review_id=r[0]) }}" style="margin-top:8px;">
            <button class="primary" type="submit">Delete Review</button>
          </form>
        </div>
      {% endfor %}
    {% else %}
      <p>You have not added any reviews yet.</p>
    {% endif %}
  </section>
</body>
</html>
