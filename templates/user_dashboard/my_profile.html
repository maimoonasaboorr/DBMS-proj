<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | Luxury Rent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <header class="nav">
    <div class="brand">LUXURY RENT</div>
    <nav class="menu">
      <a href="{{ url_for('products_dashboard') }}">Products</a>
      <a href="{{ url_for('my_bookings') }}">My Bookings</a>
      <a href="{{ url_for('my_rentals') }}">My Rentals</a>
      <a href="{{ url_for('my_payments') }}">My Payments</a>
      <a href="{{ url_for('my_reviews') }}">My Reviews</a>
      <a href="{{ url_for('my_profile') }}">My Profile</a>
    </nav>
    <a class="ghost-btn signup-btn" href="{{ url_for('logout') }}">Logout</a>
  </header>

  <section class="auth-card">
    <p class="eyebrow">USER DASHBOARD</p>
    <h1>My Profile</h1>

    {% if message %}
      <p class="form-msg">{{ message }}</p>
    {% endif %}

    <form method="post" class="auth-form">
      <label for="full_name">Full Name</label>
      <input id="full_name" name="full_name" type="text" value="{{ user[0] }}" required>

      <label for="email">Email</label>
      <input id="email" type="email" value="{{ user[1] }}" disabled>

      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="text" value="{{ user[2] or '' }}">

      <label for="address">Address</label>
      <input id="address" name="address" type="text" value="{{ user[3] or '' }}">

      <label for="password">New Password (optional)</label>
      <input id="password" name="password" type="password" placeholder="Leave blank to keep current">

      <button class="primary auth-submit" type="submit">Update Profile</button>
    </form>
  </section>
</body>
</html>
