<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Brands | Luxury Rent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <header class="nav">
    <div class="brand">LUXURY RENT</div>
    <nav class="menu">
      <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
      <a href="{{ url_for('admin_categories') }}">Categories</a>
      <a href="{{ url_for('admin_products') }}">Products</a>
      <a href="{{ url_for('admin_inventory') }}">Inventory</a>
    </nav>
    <a class="ghost-btn signup-btn" href="{{ url_for('logout') }}">Logout</a>
  </header>

  <section class="auth-card">
    <p class="eyebrow">ADMIN</p>
    <h1>Brands</h1>

    <form method="post" action="{{ url_for('admin_add_brand') }}" class="auth-form">
      <label for="brand_name">Brand Name</label>
      <input id="brand_name" name="brand_name" type="text" required placeholder="e.g. Sony">
      <button class="primary auth-submit" type="submit">Add Brand</button>
    </form>

    <hr>
    <h2>Existing Brands</h2>
    {% if brands %}
      {% for brand in brands %}
        <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">
          <span>{{ brand[1] }}</span>
          <form method="post" action="{{ url_for('admin_delete_brand', brand_id=brand[0]) }}">
            <button type="submit">Delete</button>
          </form>
        </div>
      {% endfor %}
    {% else %}
      <p>No brands found.</p>
    {% endif %}
  </section>
</body>
</html>
