<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Luxury Rent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page admin-panel">
  <header class="nav">
    <div class="brand">LUXURY RENT</div>
    <nav class="menu">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
    </nav>
    <a class="ghost-btn signup-btn" href="{{ url_for('logout') }}">Logout</a>
  </header>

  <section class="auth-card admin-dashboard-card">
    <p class="eyebrow">ADMIN DASHBOARD</p>
    <h1>Admin Dashboard</h1>
    <p class="desc">Choose what you want to manage.</p>

    <div class="admin-actions-grid">
      <a class="primary auth-submit card-link" href="{{ url_for('admin_categories') }}">Manage Categories</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_brands') }}">Manage Brands</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_products') }}">Manage Products</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_inventory') }}">Manage Inventory</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_bookings') }}">Manage Bookings</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_rentals') }}">View Rentals</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_returns') }}">Manage Returns</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_users') }}">View Users</a>
      <a class="primary auth-submit card-link" href="{{ url_for('admin_payments') }}">View Payments</a>
    </div>
  </section>
</body>
</html>
