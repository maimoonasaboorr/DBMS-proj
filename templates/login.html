<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Luxury Rent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <header class="nav">
    <div class="brand">LUXURY RENT</div>
    <nav class="menu">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="#">FAQs</a>
      <a href="#">About Us</a>
    </nav>
    <a class="ghost-btn signup-btn" href="{{ url_for('signup') }}">Sign Up</a>
  </header>

  <section class="auth-card">
    <p class="eyebrow">ACCOUNT ACCESS</p>
    <h1>Login</h1>
    <p class="desc">Enter your `users` table credentials.</p>

    {% if submitted %}
      <p class="form-msg">{{ message }}</p>
    {% endif %}

    <form method="post" class="auth-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="you@example.com" value="{{ email or '' }}">

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required placeholder="Enter password">

      <button class="primary auth-submit" type="submit">Login</button>
    </form>
  </section>
</body>
</html>
