<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Categories | Luxury Rent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <header class="nav">
    <div class="brand">LUXURY RENT</div>
    <nav class="menu">
      <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
      <a href="{{ url_for('admin_brands') }}">Brands</a>
      <a href="{{ url_for('admin_products') }}">Products</a>
      <a href="{{ url_for('admin_inventory') }}">Inventory</a>
    </nav>
    <a class="ghost-btn signup-btn" href="{{ url_for('logout') }}">Logout</a>
  </header>

  <section class="auth-card">
    <p class="eyebrow">ADMIN</p>
    <h1>Categories</h1>

    <form method="post" action="{{ url_for('admin_add_category') }}" class="auth-form">
      <label for="category_name">Category Name</label>
      <input id="category_name" name="category_name" type="text" required placeholder="e.g. Cameras">
      <button class="primary auth-submit" type="submit">Add Category</button>
    </form>

    <hr>
    <h2>Existing Categories</h2>
    {% if categories %}
      {% for category in categories %}
        <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">
          <span>{{ category[1] }}</span>
          <form method="post" action="{{ url_for('admin_delete_category', category_id=category[0]) }}">
            <button type="submit">Delete</button>
          </form>
        </div>
      {% endfor %}
    {% else %}
      <p>No categories found.</p>
    {% endif %}
  </section>
</body>
</html>
