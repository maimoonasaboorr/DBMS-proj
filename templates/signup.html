<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Luxury Rent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <header class="nav">
    <div class="brand">LUXURY RENT</div>
    <nav class="menu">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('faqs') }}">FAQs</a>
      <a href="{{ url_for('about') }}">About Us</a>
    </nav>
    <a class="ghost-btn signup-btn" href="{{ url_for('login') }}">Login</a>
  </header>

  <section class="auth-card">
    <p class="eyebrow">NEW MEMBER</p>
    <h1>Sign Up</h1>

    {% if submitted %}
      <p class="form-msg">{{ message }}</p>
    {% endif %}

    <form method="post" class="auth-form">
      <label for="full_name">Full Name</label>
      <input id="full_name" name="full_name" type="text" required placeholder="Enter full name" value="{{ form_data.get('full_name', '') }}">

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="you@example.com" value="{{ form_data.get('email', '') }}">

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required minlength="8" placeholder="Create password">
      <label><input type="checkbox" id="toggleSignupPassword"> Show password</label>

      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="text" placeholder="+92..." value="{{ form_data.get('phone', '') }}">

      <label for="address">Address</label>
      <textarea id="address" name="address" rows="3" placeholder="Enter address">{{ form_data.get('address', '') }}</textarea>

      <button class="primary auth-submit" type="submit">Create Account</button>
    </form>
  </section>
  <script>
    const signupPassword = document.getElementById("password");
    const signupToggle = document.getElementById("toggleSignupPassword");
    if (signupPassword && signupToggle) {
      signupToggle.addEventListener("change", () => {
        signupPassword.type = signupToggle.checked ? "text" : "password";
      });
    }
  </script>
</body>
</html>
